<div class="dashboard-wrapper">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h5 class="m-0 font-bold uppercase text-xs tracking-widest" style="color: var(--primary-blue);">Resident Portal</h5>
    </div>
    <nav class="mt-4">
      <a class="nav-link" routerLink="./" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        Home
      </a>
      <a class="nav-link" routerLink="./add-visitor" routerLinkActive="active">
        Add Guest
      </a>
      <a class="nav-link" routerLink="./my-visitors" routerLinkActive="active">
        History
      </a>
      <a class="nav-link" routerLink="./profile" routerLinkActive="active">
        Profile
      </a>
      <div class="mt-8 pt-4 border-t">
        <button class="nav-link w-full text-left" style="background: transparent; border: none; cursor: pointer; color: #ef4444;" (click)="logout()">
          Logout
        </button>
      </div>
    </nav>
  </div>

  <!-- Content -->
  <div class="content-area pt-12">
    <router-outlet></router-outlet>
  </div>
</div>
