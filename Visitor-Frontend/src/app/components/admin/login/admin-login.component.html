<div class="h-screen w-full flex items-center justify-center bg-white">
  <div class="max-w-md w-full p-10 border">
    <div class="text-center mb-10">
      <h1 class="text-2xl font-bold">Admin Login</h1>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" required 
               class="w-full border p-3 bg-gray-50 text-sm focus:outline-none focus:bg-white transition-colors">
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required 
               class="w-full border p-3 bg-gray-50 text-sm focus:outline-none focus:bg-white transition-colors">
      </div>

      <div *ngIf="error" class="text-xs text-red-600 font-bold mb-4">{{ error }}</div>

      <button type="submit" [disabled]="loginForm.invalid || loading" 
              class="w-full py-3 bg-gray-800 text-white font-bold uppercase text-xs tracking-widest">
        Login
      </button>
      
      <div class="mt-8 text-center border-t pt-6">
        <a href="/" class="text-xs text-gray-500 hover:text-black">Back to Home</a>
      </div>
    </form>
  </div>
</div>
