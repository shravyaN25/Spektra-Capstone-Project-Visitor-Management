<div class="vh-100 w-100 d-flex flex-column bg-blue-primary overflow-hidden"> <!--create a full screen container with vertical layout and blue background-->

  

  <header class="bg-white py-4 px-4 shadow-sm text-center"> <!--White bar at top with padding and centered text-->
  <!--py-vertical padding //px-horizontal padding-->
    <h1 class="text-blue-primary h5 fw-bold mb-0 text-uppercase" style="letter-spacing: 3px;"><!--Blue bold uppercase title centered in header-->
      Visitor Entry Management System with OTP verification
    </h1>
  </header>



  <!-- Main Content Area (Centered Card) -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center p-3">
    <!-- Main white card -->
    <div class="bg-white shadow-lg p-5 text-center rounded-4" style="max-width: 420px; width: 100%;">
      <h1 class="display-6 fw-bold mb-1 text-blue-primary text-uppercase">Welcome</h1>
      <p class="text-secondary small fw-bold mb-5 text-uppercase" style="letter-spacing: 1px;">Security & Resident Access</p>



      <!-- Selection Buttons --> <!--Button block form is shown if showfrom is none-->
      <div *ngIf="showForm === 'none'" class="d-grid gap-3">
        <button (click)="setViewMode('resident')"
          class="btn py-3 bg-blue-primary text-white fw-bold text-uppercase rounded-3 hover-brightness-110 shadow-sm border-0">
          Resident Login
        </button>
        <button (click)="setViewMode('security')"
          class="btn py-3 bg-blue-primary text-white fw-bold text-uppercase rounded-3 hover-brightness-110 shadow-sm border-0">
          Security Login
        </button>
      </div>



    <!-- Login Forms -->
    <!--After resident clicks, showform=resident and resident is not none so the selection button block is not shown -->

      <div *ngIf="showForm !== 'none'">
        <div class="d-flex align-items-center justify-content-between mb-4 border-bottom border-primary pb-2">
          <h2 class="h6 fw-bold text-blue-primary mb-0 text-uppercase">
            {{ showForm === 'resident' ? 'Resident Login' : 'Security Login' }}
          </h2>
          <button (click)="setViewMode('none')"
            class="btn btn-link btn-sm text-decoration-none text-primary fw-bold text-uppercase p-0 border-0">
            Back
          </button>
        </div>

        <!-- Forms Container -->
        <div class="text-start">
          <!-- Resident Form -->
          <form *ngIf="showForm === 'resident'" (ngSubmit)="onSubmitResident()" class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-bold text-blue-primary text-uppercase mb-1">Email</label>

              <input type="email" name="resEmail" [(ngModel)]="residentLoginData.email" required
                
              class="form-control border-primary-subtle p-3 text-sm focus-ring" placeholder="Enter Email">
            </div>
            <div class="col-12">
             
              <label class="form-label small fw-bold text-blue-primary text-uppercase mb-1">Passcode</label>
             
              <input type="password" name="resPassword" [(ngModel)]="residentLoginData.password" required
              
              class="form-control border-primary-subtle p-3 text-sm focus-ring" placeholder="Enter Passcode">
            </div>
            <div *ngIf="residentError" class="col-12 mb-0">
              <div
                class="alert alert-danger py-2 small fw-bold mb-0 border-0 border-start border-danger border-3 bg-danger-subtle text-danger">
                {{ residentError }}
              </div>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" [disabled]="loadingResident"
                class="btn w-100 py-3 bg-blue-primary text-white fw-bold text-uppercase rounded-3 shadow-sm border-0">
                Sign In
              </button>
            </div>
          </form>

          <!-- Security Form -->
          <form *ngIf="showForm === 'security'" (ngSubmit)="onSubmitSecurity()" class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-bold text-blue-primary text-uppercase mb-1">Email</label>


              <input type="email" name="secEmail" [(ngModel)]="securityLoginData.email" required


                class="form-control border-primary-subtle p-3 text-sm focus-ring" placeholder="Enter Email">
            </div>
            <div class="col-12">
              <label class="form-label small fw-bold text-blue-primary text-uppercase mb-1">Passcode</label>

              
              <input type="password" name="secPassword" [(ngModel)]="securityLoginData.password" required
               
              class="form-control border-primary-subtle p-3 text-sm focus-ring" placeholder="Enter Passcode">
            </div>
            <div *ngIf="securityError" class="col-12 mb-0">
              <div
                class="alert alert-danger py-2 small fw-bold mb-0 border-0 border-start border-danger border-3 bg-danger-subtle text-danger">
                {{ securityError }}
              </div>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" [disabled]="loadingSecurity"
                class="btn w-100 py-3 bg-blue-primary text-white fw-bold text-uppercase rounded-3 shadow-sm border-0">
                Sign In
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer (White with Blue Text) -->
  <footer class="bg-white py-3 text-center shadow-sm mt-auto border-top">
    <p class="text-blue-primary small mb-0 fw-bold text-uppercase" style="letter-spacing: 2px;">
      ALL RIGHTS RESERVED
    </p>
  </footer>

</div>
